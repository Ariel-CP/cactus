gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
  text/plain text/css application/json
  application/javascript text/xml application/xml
  application/xml+rss text/javascript;

server {
  listen 80;
  server_name _;

  # Tamaño máximo de request (futuras subidas de archivos)
  client_max_body_size 10m;

  # Timeouts generosos — el build en RPi puede tardar en el primer boot
  proxy_connect_timeout  30s;
  proxy_read_timeout    120s;
  proxy_send_timeout     60s;

  location /api/ {
    proxy_pass         http://api:8000/api/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Deshabilitar buffering para SSE / streaming futuro
    proxy_buffering    off;
  }

  location / {
    proxy_pass         http://frontend:80;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}

