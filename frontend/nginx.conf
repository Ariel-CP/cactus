gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
  text/plain text/css application/json
  application/javascript text/xml application/xml
  text/javascript;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html: nunca cachear (siempre la versión más nueva)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Assets con hash en el nombre (Vite): cachear por 1 año
  location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # Service worker: nunca cachear
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
}

